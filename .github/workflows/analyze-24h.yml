name: Daily Intelligence Analysis (24h)

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 06:00
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Execute Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_FLASH: ${{ secrets.GEMINI_MODEL_FLASH }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          ZAI_BASE_URL: ${{ secrets.ZAI_BASE_URL }}
          ZAI_MODEL_large: ${{ secrets.ZAI_MODEL_large }}
        run: |
          # 1. 前日の中間ファイルをクリーンアップ
          python cleanup_pipeline.py --mode morning
          # 2. 最新ニュースをRSSから収集
          python fetch_news.py
          # 3. AIによる絞り込みと重要度判定
          python process_news.py
          # 4. 【最新】デコード方式による本文抽出
          python bulk_extract_gnews.py
          # 5. トピック名寄せ
          python group_news.py
          # 6. アナリストによる深掘り分析
          python analyze_articles.py
          # 7. 【最新】AIエディターによる一括校閲
          python verify_reports.py
          # 8. 最終成果物のアーカイブとインデックス更新（Vercel同期用）
          python archive_results.py
          
      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add final_reports.json archive/
          git add news_data.json dates.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-report: Hardened Intelligence Portfolio [skip ci]" && git pull --rebase && git push)
