name: Daily News Fetch (12h)

on:
  schedule:
    - cron: '0 9,21 * * *' # 日本時間 06:00 & 18:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Evening Cleanup (Preparing for data stock)
        run: python cleanup_pipeline.py --mode evening

      - name: Fetch EV News
        run: python fetch_news.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-fetch: update news_data.json [skip ci]" && git push)
